name: vpn-smoke-test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps (before VPN connects)
        run: |
          pip install pymssql
          sudo apt-get update && sudo apt-get install -y openvpn

      - name: Connect VPN
        run: |
          echo "${{ secrets.VPN_PROD_FYNANCIAL }}" | base64 -d > client.ovpn
          sudo openvpn --config client.ovpn --daemon --log vpn.log
          sleep 5
          echo "--- vpn.log so far ---"
          sudo cat vpn.log

      - name: Test - can we reach the DB server?
        run: |
          timeout 60 bash -c 'until nc -z -w3 ${{ secrets.FYNANCIAL_DB_SERVER }} 1433; do echo "waiting..."; sleep 3; done' \
            && echo "✅ Port 1433 reachable" \
            || { echo "❌ Could not reach DB server"; sudo cat vpn.log; exit 1; }

      - name: Test - authenticate and query
        env:
          DB_SERVER: ${{ secrets.FYNANCIAL_DB_SERVER }}
          DB_NAME: ${{ secrets.FYNANCIAL_DB_NAME }}
          DB_USER: ${{ secrets.FYNANCIAL_DB_USER }}
          DB_PASSWORD: ${{ secrets.FYNANCIAL_DB_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, pymssql
          conn = pymssql.connect(
              server=os.environ["DB_SERVER"],
              database=os.environ["DB_NAME"],
              user=os.environ["DB_USER"],
              password=os.environ["DB_PASSWORD"],
              timeout=15,
          )
          cur = conn.cursor()
          cur.execute("SELECT @@SERVERNAME, DB_NAME(), GETDATE()")
          print("✅ Connected:", cur.fetchone())
          EOF